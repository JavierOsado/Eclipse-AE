name: Java CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Download JUnit 5
      run: |
        mkdir lib
        curl -L -o lib/junit-platform-console-standalone.jar \
        https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.1/junit-platform-console-standalone-1.10.1.jar

    - name: Compile Java files
      run: |
        mkdir -p out
        javac -cp "lib/junit-platform-console-standalone.jar" -d out $(find src -name "*.java")

    - name: Run tests
      run: |
        java -jar lib/junit-platform-console-standalone.jar \
        --class-path out \
        --scan-class-path
